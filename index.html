<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="混凝土试验">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>混凝土试验记录</title>
<style>
:root { --blue:#007aff;--red:#ff3b30;--orange:#ff9500;--green:#34c759;--gray:#8e8e93;--bg:#f2f2f7;--card:#fff;--border:#d1d1d6; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:var(--bg);color:#1c1c1e;padding-bottom:80px;-webkit-text-size-adjust:100%}
.header{background:var(--blue);color:#fff;padding:50px 16px 14px;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:600;text-align:center}
.sync-status{text-align:center;font-size:11px;opacity:.8;margin-top:4px}
.tab-bar{display:flex;margin-top:10px;background:rgba(255,255,255,.2);border-radius:8px;overflow:hidden}
.tab-btn{flex:1;padding:7px 0;text-align:center;font-size:13px;font-weight:500;color:rgba(255,255,255,.8);border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tab-btn.active{background:#fff;color:var(--blue);border-radius:7px}
.dashboard{margin:16px}
.dash-section{margin-bottom:16px}
.dash-title{font-size:14px;font-weight:600;color:var(--gray);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:4px;display:inline-block}
.dot-red{background:var(--red)}.dot-orange{background:var(--orange)}.dot-green{background:var(--green)}
button.dash-card{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:6px;box-shadow:0 1px 2px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;width:100%;border:none;text-align:left;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.05);font-family:inherit;font-size:inherit;color:inherit}
.dash-card .left .name{font-size:15px;font-weight:600}
.dash-card .left .detail{font-size:12px;color:var(--gray);margin-top:2px}
.dash-card .right{text-align:right}
.age-badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:12px;font-weight:600;color:#fff;margin-left:4px}
.badge-red{background:var(--red)}.badge-orange{background:var(--orange)}.badge-blue{background:var(--blue)}
.type-badge{display:inline-block;padding:2px 6px;border-radius:6px;font-size:10px;background:#e8e8ed;color:#555;margin-left:4px}
.step-info{font-size:11px;color:var(--gray);margin-top:3px}
.dash-empty{text-align:center;color:var(--gray);padding:30px;font-size:14px}
.dash-card.done{opacity:.5}
.done-badge{display:inline-block;padding:2px 6px;border-radius:6px;font-size:10px;background:var(--green);color:#fff;margin-left:4px}
.page{display:none}.page.active{display:block}
.form-card{background:var(--card);margin:16px;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.form-card label{display:block;font-size:13px;color:var(--gray);margin-bottom:4px;margin-top:14px}
.form-card label:first-child{margin-top:0}
.form-card input[type="text"],.form-card input[type="date"],.form-card input[type="number"]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:16px;background:#f9f9fb;-webkit-appearance:none}
.form-card input:focus{outline:none;border-color:var(--blue);background:#fff}
.age-checks{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.age-check input{display:none}
.age-check span{display:inline-block;padding:8px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.age-check input:checked+span{background:var(--blue);color:#fff;border-color:var(--blue)}
.steps-area{margin-top:8px}
.step-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.step-row input[type="text"]{flex:1}
.step-row input[type="number"]{width:70px;text-align:center}
.step-row .step-del{width:30px;height:30px;border-radius:15px;border:none;background:var(--red);color:#fff;font-size:18px;line-height:28px;text-align:center;cursor:pointer;flex-shrink:0}
.btn-add-step{padding:8px 14px;border:1.5px dashed var(--border);border-radius:8px;background:none;color:var(--blue);font-size:13px;cursor:pointer}
.btn-submit{width:100%;margin-top:18px;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-submit:active{background:#005ecb}
/* 测试项目块 */
.test-block{background:#f9f9fb;border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:10px;position:relative}
.test-block-title{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.test-block-del{width:24px;height:24px;border-radius:12px;border:none;background:var(--red);color:#fff;font-size:14px;line-height:22px;text-align:center;cursor:pointer}
.btn-add-test{width:100%;padding:12px;border:1.5px dashed var(--border);border-radius:10px;background:none;color:var(--blue);font-size:14px;font-weight:500;cursor:pointer;margin-top:12px}
.list{margin:12px 16px}
.record-card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.record-header{display:flex;justify-content:space-between;align-items:center}
.record-header .name{font-size:16px;font-weight:600}
.record-meta{font-size:12px;color:var(--gray);margin:4px 0 8px}
.test-group{margin-bottom:8px;padding:8px 10px;background:#f9f9fb;border-radius:8px}
.test-group-title{font-size:13px;font-weight:600;color:#555;margin-bottom:4px}
.record-ages{display:flex;flex-wrap:wrap;gap:6px}
.age-tag{padding:6px 10px;border-radius:8px;text-align:center;font-size:12px;min-width:70px}
.age-tag .label{color:var(--gray)}.age-tag .date{font-weight:600;margin-top:1px}
.age-tag.overdue{background:#ffe0e0}.age-tag.today{background:#fff3cd}.age-tag.soon{background:#e8f4fd}.age-tag.normal{background:#f2f2f7}
.empty-msg{text-align:center;color:var(--gray);padding:40px 16px;font-size:15px}
.search-bar{margin:16px 16px 0}
.search-bar input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:15px;background:var(--card);-webkit-appearance:none}
.search-bar input:focus{outline:none;border-color:var(--blue)}
.toolbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid #e5e5ea;display:flex;padding:8px 16px;padding-bottom:max(8px,env(safe-area-inset-bottom));gap:8px;z-index:100}
.toolbar button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:13px;color:var(--blue);cursor:pointer}
.toolbar .danger{color:var(--red);border-color:var(--red)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal-content{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.modal-title{font-size:17px;font-weight:600;text-align:center;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.modal-btns .cancel{background:var(--bg);color:#1c1c1e}.modal-btns .save{background:var(--blue);color:#fff}
.detail-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:flex-end}
.detail-overlay.show{display:flex}
.detail-content{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.d-title{font-size:20px;font-weight:700;margin-bottom:4px}
.d-sub{font-size:13px;color:var(--gray);margin-bottom:16px}
.d-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
.d-row:last-of-type{border-bottom:none}
.d-label{font-size:14px;color:var(--gray)}.d-value{font-size:14px;font-weight:600}
.btn-done{width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px}
.btn-done.mark{background:var(--green);color:#fff}
.btn-done.undo{background:var(--bg);color:var(--gray)}
.btn-close{width:100%;padding:12px;border-radius:10px;border:none;background:var(--bg);color:#1c1c1e;font-size:15px;margin-top:8px;cursor:pointer}
.pin-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;justify-content:center;align-items:center;padding:24px}
.pin-overlay.show{display:flex}
.pin-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px;text-align:center}
.pin-box .title{font-size:17px;font-weight:600;margin-bottom:6px}
.pin-box .desc{font-size:13px;color:var(--gray);margin-bottom:16px;line-height:1.5}
.pin-box input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:20px;text-align:center;letter-spacing:4px;-webkit-appearance:none}
.pin-box input:focus{outline:none;border-color:var(--blue)}
.pin-box button{width:100%;padding:13px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;background:var(--blue);color:#fff}
</style>
</head>
<body>
<div class="header">
  <h1>混凝土试验记录</h1>
  <div class="sync-status" id="syncStatus">v5 --</div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('dashboard',this)">今日看板</button>
    <button class="tab-btn" onclick="switchTab('add',this)">添加记录</button>
    <button class="tab-btn" onclick="switchTab('records',this)">全部记录</button>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-content" id="detailContent"></div>
</div>
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="title">设置访问密码</div>
    <div class="desc">设置一个4-8位密码，用来保护你的数据。<br>换手机时输入同样的密码即可恢复全部数据。</div>
    <input type="text" id="pinInput" placeholder="输入密码" maxlength="8" autocomplete="off">
    <button onclick="handlePin()">确认</button>
  </div>
</div>

<div class="page active" id="page-dashboard">
  <div class="dashboard" id="dashboardContent"></div>
</div>

<div class="page" id="page-add">
  <div class="form-card">
    <label>试件编号</label>
    <input type="text" id="inputId" placeholder="例: C30-柱-01">
    <label>浇筑日期</label>
    <input type="date" id="inputDate">
    <div id="testBlocks"></div>
    <button type="button" class="btn-add-test" onclick="addTestBlock()">+ 添加测试项目</button>
    <button type="button" class="btn-submit" onclick="addRecord()">添加记录</button>
  </div>
</div>

<div class="page" id="page-records">
  <div class="search-bar"><input type="text" id="searchInput" placeholder="搜索试件编号..." oninput="renderRecords()"></div>
  <div class="list" id="recordList"></div>
  <div class="toolbar">
    <button onclick="exportCSV()">导出CSV</button>
    <button class="danger" onclick="clearAll()">清空全部</button>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <div class="modal-title">编辑记录</div>
    <input type="hidden" id="editIdx">
    <label style="font-size:13px;color:var(--gray);display:block;margin-bottom:4px">试件编号</label>
    <input type="text" id="editId" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:16px;margin-bottom:12px">
    <label style="font-size:13px;color:var(--gray);display:block;margin-bottom:4px">浇筑日期</label>
    <input type="date" id="editDate" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:16px;margin-bottom:12px">
    <div id="editTestBlocks"></div>
    <button type="button" class="btn-add-test" onclick="addTestBlock('editTestBlocks')">+ 添加测试项目</button>
    <div class="modal-btns">
      <button class="cancel" onclick="closeEdit()">取消</button>
      <button class="save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<script>
var SUPA_URL='https://ykcyrsqnzfizdxczrtqo.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrY3lyc3FuemZpemR4Y3pydHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODY0MjAsImV4cCI6MjA5MDc2MjQyMH0.hzi0778Vt-yXuPlEDnTsaSPZ_HAdxL8qiKCDIueOchY';
var SK='concrete_test_v2';
var ALL_AGES=[3,7,28,56,90];

// ---- PIN & 云端 ----
function getPinHash(){return localStorage.getItem(SK+'_pin')}
function makePinHash(p){var h=0;for(var i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0}return 'pin_'+Math.abs(h).toString(36)}
function setSyncStatus(m){document.getElementById('syncStatus').textContent=m}
function supa(method,q,body){
  var url=SUPA_URL+'/rest/v1/concrete_records'+(q||'');
  var h={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
  if(method==='POST'||method==='PATCH')h['Prefer']='return=representation';
  var o={method:method,headers:h};if(body)o.body=JSON.stringify(body);
  return fetch(url,o).then(function(r){return r.json()});
}
function cloudLoad(pin){
  setSyncStatus('同步中...');
  return supa('GET','?pin_hash=eq.'+pin+'&select=data&limit=1').then(function(rows){
    if(rows&&rows.length>0&&rows[0].data){setSyncStatus('已同步');return rows[0].data}
    setSyncStatus('云端无数据');return null;
  }).catch(function(){setSyncStatus('离线模式');return null});
}
function cloudSave(pin,data){
  setSyncStatus('保存中...');
  return supa('GET','?pin_hash=eq.'+pin+'&select=id').then(function(rows){
    if(rows&&rows.length>0)return supa('PATCH','?pin_hash=eq.'+pin,{data:data,updated_at:new Date().toISOString()});
    else return supa('POST','',{pin_hash:pin,data:data});
  }).then(function(){setSyncStatus('已保存')}).catch(function(){setSyncStatus('保存失败')});
}

// ---- 存储 ----
function load(){try{return JSON.parse(localStorage.getItem(SK))||[]}catch(e){return[]}}
function save(records){
  localStorage.setItem(SK,JSON.stringify(records));
  var pin=getPinHash();if(pin)cloudSave(pin,records);
}
function getDoneMap(){try{return JSON.parse(localStorage.getItem(SK+'_done'))||{}}catch(e){return{}}}
function saveDoneMap(m){localStorage.setItem(SK+'_done',JSON.stringify(m));var pin=getPinHash();if(pin)cloudSave(pin,load())}

// ---- 工具 ----
function addDays(ds,n){var d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return d}
function fmt(d){return(d.getMonth()+1)+'/'+d.getDate()}
function fmtFull(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function todayStr(){return fmtFull(new Date())}
function esc(s){var e=document.createElement('span');e.textContent=s;return e.innerHTML}
function stepsTotal(st){return(st||[]).reduce(function(s,x){return s+(parseInt(x.days)||0)},0)}
function skipWeekend(d){
  var dt=new Date(d);var day=dt.getDay();
  if(day===6)dt.setDate(dt.getDate()+2); // 周六→周一
  if(day===0)dt.setDate(dt.getDate()+1); // 周日→周一
  return dt;
}
function calcDates(castDate,age,steps){
  var ageDate=skipWeekend(addDays(castDate,age)),cur=new Date(ageDate);
  var sd=(steps||[]).map(function(st){var start=new Date(cur),days=parseInt(st.days)||0;cur=skipWeekend(addDays(fmtFull(start),days));return{name:st.name,days:days,start:start,end:new Date(cur)}});
  return{ageDate:ageDate,testDate:cur,stepDates:sd};
}
function dateStatus(td){
  var today=new Date();today.setHours(0,0,0,0);var t=new Date(td);t.setHours(0,0,0,0);
  var diff=Math.round((t-today)/86400000);
  if(diff<0)return'overdue';if(diff===0)return'today';if(diff<=3)return'soon';return'normal';
}

// ---- 兼容旧数据 ----
function migrateRecord(r){
  // 旧格式: {id, castDate, ages:[], steps:[]} → 新格式: {id, castDate, tests:[{type, ages:[], steps:[]}]}
  if(r.tests)return r; // 已是新格式
  return{id:r.id, castDate:r.castDate, tests:[{type:'强度',ages:r.ages||[7,28],steps:r.steps||[]}], created:r.created};
}

// ---- Tab ----
function switchTab(name,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  if(name==='dashboard')renderDashboard();
  if(name==='records')renderRecords();
}

// ---- 测试项目UI ----
var _testBlockId=0;
function addTestBlock(containerId){
  containerId=containerId||'testBlocks';
  var area=document.getElementById(containerId);
  var bid=_testBlockId++;
  var div=document.createElement('div');
  div.className='test-block';
  div.id='tb_'+bid;
  div.innerHTML='<div class="test-block-title"><span>测试项目</span><button type="button" class="test-block-del" onclick="this.closest(\'.test-block\').remove()">×</button></div>'+
    '<label style="font-size:13px;color:var(--gray);margin:0 0 4px;display:block">测试类型名称</label>'+
    '<input type="text" placeholder="如: 强度、吸水性、抗渗性" class="test-type-name" style="margin-bottom:8px">'+
    '<label style="font-size:13px;color:var(--gray);margin:0 0 4px;display:block">选择龄期（天）</label>'+
    '<div class="age-checks">'+ALL_AGES.map(function(a){return'<label class="age-check"><input type="checkbox" value="'+a+'"'+(a===7||a===28?' checked':'')+'><span>'+a+'</span></label>'}).join('')+'</div>'+
    '<label style="font-size:13px;color:var(--gray);margin:10px 0 4px;display:block">额外加工步骤（龄期到后依次进行）</label>'+
    '<div class="steps-area" id="steps_'+bid+'"></div>'+
    '<button type="button" class="btn-add-step" onclick="addStepRow(\'steps_'+bid+'\')">+ 添加加工步骤</button>';
  area.appendChild(div);
}
function addStepRow(cid){
  var a=document.getElementById(cid),r=document.createElement('div');r.className='step-row';
  r.innerHTML='<input type="text" placeholder="步骤名称（如烘箱干燥）" class="step-name"><input type="number" placeholder="天" class="step-days" min="0"><button type="button" class="step-del" onclick="this.parentElement.remove()">×</button>';
  a.appendChild(r);
}
function getTestBlocks(containerId){
  containerId=containerId||'testBlocks';
  var blocks=document.getElementById(containerId).querySelectorAll('.test-block');
  var tests=[];
  blocks.forEach(function(b){
    var typeName=b.querySelector('.test-type-name').value.trim()||'未命名';
    var ages=[];b.querySelectorAll('.age-check input:checked').forEach(function(cb){ages.push(parseInt(cb.value))});
    var stepsArea=b.querySelector('.steps-area');
    var steps=[];
    stepsArea.querySelectorAll('.step-row').forEach(function(r){
      var n=r.querySelector('.step-name').value.trim(),d=r.querySelector('.step-days').value;
      if(n&&d)steps.push({name:n,days:parseInt(d)});
    });
    if(ages.length>0)tests.push({type:typeName,ages:ages,steps:steps});
  });
  return tests;
}
function renderTestBlocks(containerId,tests){
  var area=document.getElementById(containerId);
  area.innerHTML='';
  (tests||[]).forEach(function(t){
    var bid=_testBlockId++;
    var div=document.createElement('div');
    div.className='test-block';div.id='tb_'+bid;
    div.innerHTML='<div class="test-block-title"><span>测试项目</span><button type="button" class="test-block-del" onclick="this.closest(\'.test-block\').remove()">×</button></div>'+
      '<label style="font-size:13px;color:var(--gray);margin:0 0 4px;display:block">测试类型名称</label>'+
      '<input type="text" value="'+esc(t.type)+'" class="test-type-name" style="margin-bottom:8px">'+
      '<label style="font-size:13px;color:var(--gray);margin:0 0 4px;display:block">选择龄期（天）</label>'+
      '<div class="age-checks">'+ALL_AGES.map(function(a){return'<label class="age-check"><input type="checkbox" value="'+a+'"'+(t.ages.indexOf(a)>=0?' checked':'')+'><span>'+a+'</span></label>'}).join('')+'</div>'+
      '<label style="font-size:13px;color:var(--gray);margin:10px 0 4px;display:block">额外加工步骤</label>'+
      '<div class="steps-area" id="steps_'+bid+'"></div>'+
      '<button type="button" class="btn-add-step" onclick="addStepRow(\'steps_'+bid+'\')">+ 添加加工步骤</button>';
    area.appendChild(div);
    // 填充加工步骤
    (t.steps||[]).forEach(function(st){
      var sr=document.createElement('div');sr.className='step-row';
      sr.innerHTML='<input type="text" value="'+esc(st.name)+'" class="step-name"><input type="number" value="'+st.days+'" class="step-days" min="0"><button type="button" class="step-del" onclick="this.parentElement.remove()">×</button>';
      document.getElementById('steps_'+bid).appendChild(sr);
    });
  });
}

// ---- 添加 ----
function addRecord(){
  var id=document.getElementById('inputId').value.trim(),date=document.getElementById('inputDate').value;
  if(!id){alert('请输入试件编号');return}if(!date){alert('请选择浇筑日期');return}
  var tests=getTestBlocks('testBlocks');
  if(!tests.length){alert('请至少添加一个测试项目');return}
  var records=load();
  records.unshift({id:id,castDate:date,tests:tests,created:Date.now()});
  save(records);
  document.getElementById('inputId').value='';
  document.getElementById('testBlocks').innerHTML='';
  addTestBlock();
  alert('添加成功！');
  switchTab('dashboard',document.querySelector('.tab-btn'));
}

// ---- 看板 ----
var _dashTasks=[];
function onDashClick(i){try{var t=_dashTasks[i];if(t)openDetail(t.recordId,t.testType,t.age,fmtFull(t.testDate))}catch(e){alert('错误:'+e.message)}}
function renderDashboard(){
  var records=load(),today=todayStr(),todayD=new Date(today+'T00:00:00'),tasks=[];
  records.forEach(function(r){
    r=migrateRecord(r);
    (r.tests||[]).forEach(function(test){
      (test.ages||[]).forEach(function(age){
        var info=calcDates(r.castDate,age,test.steps),status=dateStatus(info.testDate);
        var diff=Math.round((info.testDate-todayD)/86400000);
        if(diff>=-30&&diff<=7){
          var cs=null;
          if(test.steps&&test.steps.length>0){info.stepDates.forEach(function(sd){
            var s0=new Date(sd.start);s0.setHours(0,0,0,0);var s1=new Date(sd.end);s1.setHours(0,0,0,0);
            if(todayD>=s0&&todayD<s1)cs=sd.name+'中（还剩'+Math.round((s1-todayD)/86400000)+'天）';
          })}
          tasks.push({recordId:r.id,testType:test.type,age:age,testDate:info.testDate,status:status,diff:diff,steps:test.steps,currentStep:cs});
        }
      });
    });
  });
  var overdue=tasks.filter(function(t){return t.status==='overdue'}).sort(function(a,b){return b.diff-a.diff});
  var todayT=tasks.filter(function(t){return t.status==='today'});
  var upcoming=tasks.filter(function(t){return(t.status==='soon'||t.status==='normal')&&t.diff<=7&&t.diff>0}).sort(function(a,b){return a.diff-b.diff});
  var html='';
  html+='<div class="dash-section"><div class="dash-title"><span class="dot dot-orange"></span>今天需要测试 ('+todayT.length+')</div>';
  if(!todayT.length)html+='<div class="dash-empty">今天没有需要测试的试件 ✓</div>';
  else todayT.forEach(function(t){html+=dashCard(t,'badge-orange',tasks.indexOf(t))});
  html+='</div>';
  if(upcoming.length){html+='<div class="dash-section"><div class="dash-title"><span class="dot dot-green"></span>未来7天 ('+upcoming.length+')</div>';upcoming.forEach(function(t){html+=dashCard(t,'badge-blue',tasks.indexOf(t))});html+='</div>'}
  if(overdue.length){html+='<div class="dash-section"><div class="dash-title"><span class="dot dot-red"></span>已过期未测 ('+overdue.length+')</div>';overdue.forEach(function(t){html+=dashCard(t,'badge-red',tasks.indexOf(t))});html+='</div>'}
  if(!records.length)html='<div class="dash-empty">暂无记录，请先添加试件</div>';
  _dashTasks=tasks;
  document.getElementById('dashboardContent').innerHTML=html;
}
function dashCard(t,bc,idx){
  var si='';
  if(t.currentStep)si='<div class="step-info">⚙ '+esc(t.currentStep)+'</div>';
  else if(t.steps&&t.steps.length>0&&t.status!=='overdue')si='<div class="step-info">含'+t.steps.length+'步加工</div>';
  var dt='';if(t.diff===0)dt='今天';else if(t.diff===1)dt='明天';else if(t.diff>1)dt=t.diff+'天后';else dt='逾期'+Math.abs(t.diff)+'天';
  var doneKey=t.recordId+'|'+t.testType+'|'+t.age+'|'+fmtFull(t.testDate);
  var isDone=!!getDoneMap()[doneKey];
  var doneTag=isDone?'<span class="done-badge">已完成</span>':'';
  var doneClass=isDone?' done':'';
  return'<button type="button" class="dash-card'+doneClass+'" onclick="onDashClick('+idx+')"><div class="left"><div class="name">'+esc(t.recordId)+'<span class="type-badge">'+esc(t.testType)+'</span>'+doneTag+'</div><div class="detail">'+dt+' · '+fmt(t.testDate)+'</div></div><div class="right"><span class="age-badge '+bc+'">'+t.age+'d</span>'+si+'</div></button>';
}

// ---- 详情 & 完成标记 ----
function openDetail(recordId,testType,age,testDateStr){
  var records=load(),record=null;
  for(var i=0;i<records.length;i++){var mr=migrateRecord(records[i]);if(mr.id===recordId){record=mr;break}}
  if(!record)return;
  var test=null;
  for(var j=0;j<(record.tests||[]).length;j++){if(record.tests[j].type===testType){test=record.tests[j];break}}
  if(!test)test={type:testType,ages:[age],steps:[]};
  var info=calcDates(record.castDate,age,test.steps);
  var doneKey=recordId+'|'+testType+'|'+age+'|'+testDateStr;
  var done=!!getDoneMap()[doneKey];
  var todayD=new Date();todayD.setHours(0,0,0,0);
  var testD=new Date(testDateStr+'T00:00:00');
  var diff=Math.round((testD-todayD)/86400000);
  var st='';
  if(done)st='<span style="color:var(--green)">已完成</span>';
  else if(diff<0)st='<span style="color:var(--red)">逾期'+Math.abs(diff)+'天</span>';
  else if(diff===0)st='<span style="color:var(--orange)">今天</span>';
  else st='<span style="color:var(--blue)">'+diff+'天后</span>';
  var html='<div class="d-title">'+esc(recordId)+'</div>';
  html+='<div class="d-sub">'+esc(testType)+' · '+age+'天龄期 · '+st+'</div>';
  html+='<div class="d-row"><span class="d-label">浇筑日期</span><span class="d-value">'+record.castDate+'</span></div>';
  html+='<div class="d-row"><span class="d-label">龄期到期</span><span class="d-value">'+fmtFull(info.ageDate)+'</span></div>';
  if(test.steps&&test.steps.length>0){
    info.stepDates.forEach(function(sd){
      html+='<div class="d-row"><span class="d-label">'+esc(sd.name)+' ('+sd.days+'天)</span><span class="d-value">'+fmtFull(sd.start)+' → '+fmtFull(sd.end)+'</span></div>';
    });
  }
  html+='<div class="d-row"><span class="d-label">实际测试日</span><span class="d-value" style="color:var(--blue);font-size:16px">'+testDateStr+'</span></div>';
  var btnId='done_btn_'+Date.now();
  if(done)html+='<button type="button" class="btn-done undo" id="'+btnId+'">撤销完成标记</button>';
  else html+='<button type="button" class="btn-done mark" id="'+btnId+'">标记为已完成</button>';
  html+='<button type="button" class="btn-close" id="close_btn">关闭</button>';
  document.getElementById('detailContent').innerHTML=html;
  document.getElementById(btnId).onclick=function(){toggleDone(doneKey)};
  document.getElementById('close_btn').onclick=closeDetail;
  document.getElementById('detailOverlay').classList.add('show');
}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('show')}
function toggleDone(key){
  var m=getDoneMap();if(m[key])delete m[key];else m[key]=Date.now();
  saveDoneMap(m);closeDetail();renderDashboard();
}

// ---- 记录列表 ----
function renderRecords(){
  var records=load(),kw=(document.getElementById('searchInput')?document.getElementById('searchInput').value:'').trim().toLowerCase();
  var filtered=kw?records.filter(function(r){return r.id.toLowerCase().indexOf(kw)>=0}):records;
  var list=document.getElementById('recordList');
  if(!filtered.length){list.innerHTML='<div class="empty-msg">'+(records.length===0?'暂无记录':'没有匹配结果')+'</div>';return}
  list.innerHTML=filtered.map(function(r){
    var ri=records.indexOf(r);
    r=migrateRecord(r);
    var testsHtml=(r.tests||[]).map(function(test){
      var ed=stepsTotal(test.steps);
      var sd=(test.steps&&test.steps.length>0)?test.steps.map(function(s){return s.name+s.days+'天'}).join(' → '):'';
      var at=test.ages.slice().sort(function(a,b){return a-b}).map(function(age){
        var info=calcDates(r.castDate,age,test.steps),st=dateStatus(info.testDate);
        return'<div class="age-tag '+st+'"><div class="label">'+age+'d'+(ed>0?'+'+ed:'')+'</div><div class="date">'+fmt(info.testDate)+'</div></div>';
      }).join('');
      return'<div class="test-group"><div class="test-group-title">'+esc(test.type)+(sd?' · '+esc(sd):'')+'</div><div class="record-ages">'+at+'</div></div>';
    }).join('');
    return'<div class="record-card"><div class="record-header"><span class="name">'+esc(r.id)+'</span><div style="display:flex;gap:6px"><button type="button" style="width:28px;height:28px;border-radius:14px;border:1px solid var(--blue);background:#fff;color:var(--blue);font-size:14px;cursor:pointer" onclick="openEditR('+ri+')">✎</button><button type="button" style="width:28px;height:28px;border-radius:14px;border:none;background:var(--red);color:#fff;font-size:18px;line-height:26px;text-align:center;cursor:pointer" onclick="delRecord('+ri+')">×</button></div></div><div class="record-meta">浇筑: '+r.castDate+'</div>'+testsHtml+'</div>';
  }).join('');
}

// ---- 编辑 ----
function openEditR(idx){
  var records=load(),r=migrateRecord(records[idx]);
  document.getElementById('editIdx').value=idx;
  document.getElementById('editId').value=r.id;
  document.getElementById('editDate').value=r.castDate;
  renderTestBlocks('editTestBlocks',r.tests);
  document.getElementById('editModal').classList.add('show');
}
function closeEdit(){document.getElementById('editModal').classList.remove('show')}
function saveEdit(){
  var idx=parseInt(document.getElementById('editIdx').value),id=document.getElementById('editId').value.trim(),date=document.getElementById('editDate').value;
  if(!id||!date){alert('请填写完整');return}
  var tests=getTestBlocks('editTestBlocks');
  if(!tests.length){alert('请至少保留一个测试项目');return}
  var records=load();
  records[idx]={id:id,castDate:date,tests:tests,created:records[idx].created};
  save(records);closeEdit();renderRecords();
}
function delRecord(idx){if(!confirm('确定删除？'))return;var r=load();r.splice(idx,1);save(r);renderRecords()}

// ---- CSV ----
function exportCSV(){
  var records=load();if(!records.length){alert('没有数据');return}
  var csv='试件编号,浇筑日期,测试类型,龄期,加工步骤,实际测试日\n';
  records.forEach(function(r){r=migrateRecord(r);(r.tests||[]).forEach(function(test){
    var sd=(test.steps||[]).map(function(s){return s.name+s.days+'天'}).join('→');
    test.ages.forEach(function(age){var info=calcDates(r.castDate,age,test.steps);
      csv+=esc(r.id)+','+r.castDate+','+esc(test.type)+','+age+'天,'+(sd||'无')+','+fmtFull(info.testDate)+'\n';
    });
  })});
  var b=new Blob(['\ufeff'+csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='混凝土试验记录.csv';a.click();
}
function clearAll(){if(!confirm('确定清空全部？不可恢复！'))return;localStorage.removeItem(SK);save([]);renderDashboard();renderRecords()}

// ---- PIN ----
function handlePin(){
  var pin=document.getElementById('pinInput').value.trim();
  if(pin.length<4){alert('密码至少4位');return}
  var pinHash=makePinHash(pin);
  localStorage.setItem(SK+'_pin',pinHash);
  document.getElementById('pinOverlay').classList.remove('show');
  cloudLoad(pinHash).then(function(cd){
    var local=load();
    if(cd&&cd.length>0){
      if(local.length===0)localStorage.setItem(SK,JSON.stringify(cd));
      else{var keys={};local.forEach(function(r){keys[r.id+'|'+r.castDate]=true});
        var nw=cd.filter(function(r){return r&&r.id&&!keys[r.id+'|'+r.castDate]});
        if(nw.length>0){localStorage.setItem(SK,JSON.stringify(local.concat(nw)));cloudSave(pinHash,local.concat(nw))}}
    }else if(local.length>0)cloudSave(pinHash,local);
    renderDashboard();
  });
}

// ---- 初始化 ----
document.getElementById('inputDate').value=todayStr();
addTestBlock(); // 默认添加一个测试项目
var existingPin=getPinHash();
if(!existingPin){
  document.getElementById('pinOverlay').classList.add('show');
  renderDashboard();
}else{
  cloudLoad(existingPin).then(function(cd){
    var local=load();
    if(cd&&cd.length>0&&local.length===0)localStorage.setItem(SK,JSON.stringify(cd));
    else if(cd&&cd.length>0){
      var keys={};local.forEach(function(r){keys[r.id+'|'+r.castDate]=true});
      var nw=cd.filter(function(r){return r&&r.id&&!keys[r.id+'|'+r.castDate]});
      if(nw.length>0)localStorage.setItem(SK,JSON.stringify(local.concat(nw)));
    }
    renderDashboard();
  });
}
